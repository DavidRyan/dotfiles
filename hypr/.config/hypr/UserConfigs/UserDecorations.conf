# Sourcing colors generated by wallust
source = $HOME/.config/hypr/colors.conf

general {
  border_size = 2
  gaps_in = 6
  gaps_out = 9
  
  col.active_border = $color14
  col.inactive_border = $color8#rgba(00000000) 
}

decoration {
  rounding = 6
         
  active_opacity = 0.95
  inactive_opacity = 0.95
  fullscreen_opacity = 0.9

  dim_inactive = true
  dim_strength = 0.01
  dim_special = 0.1

  shadow {
    enabled = false
    range = 3
    render_power = 1

    color =  $color12
    color_inactive = $color10
  }


  blur {
    enabled = true
    size = 3
    passes = 3
    ignore_opacity = true
    new_optimizations = true
    special = true
    popups = true
  }
}

group {
  col.border_active = $color15

	groupbar {
		col.active = $color0
  }
}
